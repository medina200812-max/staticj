<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Job Listings</title>
    <style></style>
  </head>
  <body
    style="
      background-color: hsl(180, 52%, 96%);
      display: flex;
      flex-direction: column;
      align-items: center;
    "
  >
    <div
      class="top"
      style="
        width: 100%;
        height: 100px;
        background-color: hsl(180, 29%, 50%);
        position: fixed;
        top: 0;
        left: 0;
        background-image: url(images/bg-header-desktop.svg);
      "
    ></div>
    <div
      class="main"
      style="display: flex; flex-direction: column; margin-top: 100px"
    ></div>
  </body>
  <script>
    const btn = document.querySelector("button");
    const main = document.querySelector(".main");
    const URL = "./data.json";

    async function addNewCard() {
      const promise = await fetch(URL);
      const data = await promise.json();
      for (let i = 0; i < data.length; i++) {
        const myCard = document.createElement("div");
        myCard.innerHTML = `
         <div
      class="cardall"
      style="
       display: flex;
        width: 1100px;
        height: 120px;
        background-color: #fff;
        margin-top: 10px;
        box-shadow: 0px 1px 5px hsl(180, 14%, 20%);
        border-radius: 5px;
        border-left: 4px solid hsl(180, 14%, 20%);
        align-items: center;
      "
    >
    <div
        class="obw"
        style="
          display: flex;
          gap: 20px;
          align-items: center;
          margin-top: 8px;
          margin-left: 50px;
        "
      >
        <img
          src="${data[i].logo}"
          style="border-radius: 50%; width: 60px; height: 60px"
        />
        <div style="display: flex; flex-direction: column">
          <div class="text" style="display: flex; gap: 10px">
            <h4
              style="
                color: hsl(180, 14%, 20%);
                font-size: 14px;
                font-family: sans-serif;
              "
            >
              ${data[i].company}
            </h4>
            <h3 class = "new"
              style="
                background-color: hsl(180, 14%, 20%);
                color: white;
                font-family: sans-serif;
                font-size: 14px;
                border-radius: 20px;
                padding: 5px;
              "
            >
              ${data[i].new}
            </h3>
            <h3 class = "featured"
              style="
                background-color: hsl(180, 14%, 20%);
                color: white;
                font-family: sans-serif;
                font-size: 14px;
                border-radius: 20px;
                padding: 5px;
              "
            >
             ${data[i].featured}
            </h3>
          </div>
          <h1
            style="font-family: sans-serif; font-size: 16px; margin-top: -7px"
          >
            ${data[i].position}
          </h1>
          <p style="margin-top: -4px; font-family: sans-serif; font-size: 13px">
           ${data[i].postedAt} ${data[i].contract} ${data[i].location}
          </p>
        </div>
        <div style="display: flex; gap: 10px; margin-left: 400px">
          <button class="btnRole"
            style="
              background-color: hsl(180, 14%, 20%);
              color: white;
              font-family: sans-serif;
              font-size: 14px;
              border-radius: 10px;
              padding: 5px;
            "
            >${data[i].role}</button
          >
           <button class="btnLvl"
            style="
              background-color: hsl(180, 14%, 20%);
              color: white;
              font-family: sans-serif;
              font-size: 14px;
              border-radius: 10px;
              padding: 5px;
            "
            >${data[i].level}</button
          >
           <button
            style="
              background-color: hsl(180, 14%, 20%);
              color: white;
              font-family: sans-serif;
              font-size: 14px;
              border-radius: 10px;
              padding: 5px;
            "
            >${data[i].languages}</button
          >

        </div>
      </div>
      </div>
      `;
        main.appendChild(myCard);

        const roles = main.querySelectorAll(".btnRole");
        roles.forEach((role) => {
          role.addEventListener("click", function () {
            const value = role.textContent;
            const cards = main.querySelectorAll(".cardall");
            cards.forEach((card) => {
              if (card.textContent.includes(value)) {
                card.style.display = "flex";
              } else {
                card.style.display = "none";
              }
            });
          });
        });
        const levels = main.querySelectorAll(".btnLvl");
        levels.forEach((level) => {
          level.addEventListener("click", function () {
            const value = level.textContent;
            const cards = main.querySelectorAll(".cardall");
            cards.forEach((card) => {
              if (card.textContent.includes(value)) {
                card.style.display = "flex";
              } else {
                card.style.display = "none";
              }
            });
          });
        });
        const newBro = myCard.querySelector(".new");
        const lastBro = myCard.querySelector(".featured");
        if (data[i].new === true) {
          newBro.textContent = "New";
        } else {
          newBro.remove();
        }

        if (data[i].featured === true) {
          lastBro.textContent = "Featured";
        } else {
          lastBro.remove();
        }
      }
    }
    window.onload = addNewCard;
  </script>
</html>
